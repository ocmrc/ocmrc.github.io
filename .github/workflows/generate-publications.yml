name: Generate Publications Index

on:
  push:
    paths:
      - 'publications/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Generate publications.json
        run: |
          echo "[" > publications.json
          first=true
          find publications -name "*.pdf" -type f | sort | while read file; do
            folder=$(dirname "$file" | sed 's|^publications/||' | sed 's|^publications$|.|')
            filename=$(basename "$file")
            size=$(stat -c%s "$file" 2>/dev/null || echo "0")
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> publications.json
            fi
            echo "  {" >> publications.json
            echo "    \"name\": \"$filename\"," >> publications.json
            echo "    \"collection\": \"$folder\"," >> publications.json
            echo "    \"path\": \"$file\"," >> publications.json
            echo "    \"size\": $size" >> publications.json
            echo "  }" >> publications.json
          done
          echo "]" >> publications.json
          cat publications.json

      - name: Commit publications.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add publications.json
          git diff --cached --quiet || git commit -m "Auto-update publications.json"
          git push
