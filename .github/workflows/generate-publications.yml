name: Generate Publications Index

on:
  push:
    paths:
      - 'publications/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate publications.json
        run: |

          echo "[]" > publications.json

          find publications -type f -iname "*.pdf" | sort | while read pdf
          do

            filename=$(basename "$pdf")

            folder=$(dirname "$pdf")
            folder=$(echo "$folder" | sed 's|^publications/||')

            size=$(stat -c%s "$pdf" 2>/dev/null || echo 0)

            jq --arg name "$filename" \
               --arg collection "$folder" \
               --arg path "$pdf" \
               --arg size "$size" \
               '. += [{
                    name:$name,
                    collection:$collection,
                    path:$path,
                    size:($size|tonumber)
               }]' publications.json > tmp.json

            mv tmp.json publications.json

          done

          echo "=== Generated JSON ==="
          cat publications.json

      - name: Commit generated file
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add publications.json

          if ! git diff --cached --quiet; then
            git commit -m "Auto update publications"
            git push
          fi
