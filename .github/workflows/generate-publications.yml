name: Generate Publications Index

on:
  push:
    paths:
      - 'publications/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Generate publications.json
        run: |

          echo "[]" > publications.json

          find publications -mindepth 1 -type d | while read dir
          do

            folder=$(basename "$dir")

            find "$dir" -maxdepth 1 -type f -name "*.pdf" | while read pdf
            do

              filename=$(basename "$pdf")
              size=$(stat -c%s "$pdf" 2>/dev/null || echo 0)

              jq --arg name "$filename" \
                 --arg collection "$folder" \
                 --arg path "$pdf" \
                 --arg size "$size" \
                 '. += [{
                    name:$name,
                    collection:$collection,
                    path:$path,
                    size:($size|tonumber)
                 }]' publications.json > tmp.json

              mv tmp.json publications.json

            done

          done

      - name: Commit publications.json
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add publications.json

          git diff --cached --quiet || git commit -m "Auto update publications"

          git push
